# Don't print a new line at the start of the prompt
add_newline = false

# Make prompt a single line instead of two lines
[line_break]
disabled = true

format = "$username $directory $git_branch$fill $time\n  [уұһӘ](fg:#c4a7e7) "
[directory]
format = "[оӮ¶](fg:#26233a)[ $path ]($style)[оӮҙ](fg:#26233a)"
style = "bg:#26233a fg:#31748f"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:#26233a"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:#26233a)[ $symbol $branch ]($style)[оӮҙ](fg:#26233a)"
style = "bg:#26233a fg:#9ccfd8"
symbol = "пҗҳ"

[time]
disabled = false
format = "[оӮ¶](fg:#26233a)[ $time пҖ— ]($style)[оӮҙ](fg:#26233a)"
style = "bg:#26233a fg:#ebbcba"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оӮ¶](fg:#26233a)[ $user ]($style)[оӮҙ](fg:#26233a)"
show_always = true
style_root = "bg:#26233a fg:#c4a7e7"
style_user = "bg:#26233a fg:#c4a7e7"
