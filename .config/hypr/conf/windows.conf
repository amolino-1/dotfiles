# Window Settings

general {
# See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 3
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(5ac5d5ff)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

dwindle {
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    }

# master {
# # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#     new_is_master = true
#     }


# Window Rules
# Window rules are case sensitive. (e.g. firefox ≠ Firefox)
# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = tile on, match:class (Vivaldi-flatpak) # Tile all instances of vivaldi
windowrule = tile on, match:class (steam_proton) # Tile all instances of Steam
# windowrulev2 = workspace 7, tile,class:(RustDesk),title:(NUC@desktop-q3sg78n - Remote Desktop - RustDesk)
# windowrulev2 = workspace 7, tile,class:(RustDesk)

# Thunar window opacity: 0.98 when focused, 0.90 when unfocused
windowrule = opacity 0.98 0.90, match:class thunar
# Volume Control (pavucontrol): force full opacity even when inactive + no blur
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:class org.pulseaudio.pavucontrol
windowrule = no_blur on, match:class org.pulseaudio.pavucontrol

